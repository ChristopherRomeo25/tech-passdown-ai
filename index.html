<script>
  const recipientList = "your@email.com"; // Change this later

  window.onload = () => {
    const today = new Date();
    document.getElementById("date").value = today.toISOString().split("T")[0];
  };

  function formatDisplayDate(dateValue) {
    if (!dateValue) return "No Date";
    const date = new Date(dateValue + "T00:00:00");
    return date.toLocaleDateString("en-US", {
      year: "numeric",
      month: "long",
      day: "numeric"
    });
  }

  function formatPassdown() {
    const dateValue = document.getElementById("date").value;
    const shift = document.getElementById("shift").value;
    const notes = document.getElementById("notes").value.trim();

    const displayDate = formatDisplayDate(dateValue);

    const onTheFloor = [];
    const safetyQuality = [];
    const actionItems = [];

    if (notes.length > 0) {
      const lines = notes
        .split("\n")
        .map(line => line.trim())
        .filter(line => line !== "");

      lines.forEach(line => {
        const lowerLine = line.toLowerCase();

        const isSafetyQuality =
          lowerLine.includes("quality") ||
          lowerLine.includes("safety") ||
          lowerLine.includes("issue") ||
          lowerLine.includes("fail") ||
          lowerLine.includes("failed") ||
          lowerLine.includes("recheck") ||
          lowerLine.includes("hold") ||
          lowerLine.includes("problem") ||
          lowerLine.includes("error");

        const isActionItem =
          lowerLine.includes("follow up") ||
          lowerLine.includes("follow-up") ||
          lowerLine.includes("check tomorrow") ||
          lowerLine.includes("tomorrow") ||
          lowerLine.includes("needs") ||
          lowerLine.includes("need to") ||
          lowerLine.includes("review") ||
          lowerLine.includes("verify") ||
          lowerLine.includes("retest") ||
          lowerLine.includes("inspect") ||
          lowerLine.includes("sebas") ||
          lowerLine.includes("kalani");

        if (isSafetyQuality) {
          safetyQuality.push(`• ${line}`);
        } else if (isActionItem) {
          actionItems.push(`• ${line}`);
        } else {
          onTheFloor.push(`• ${line}`);
        }
      });
    }

    const onTheFloorText = onTheFloor.length > 0 ? onTheFloor.join("\n") : "• No updates entered.";
    const safetyQualityText = safetyQuality.length > 0 ? safetyQuality.join("\n") : "• None.";
    const actionItemsText = actionItems.length > 0 ? actionItems.join("\n") : "• None.";

    const passdownText = `Tech Pass Down – ${displayDate} ${shift}

On The Floor
${onTheFloorText}

Safety / Quality
${safetyQualityText}

Action Items
${actionItemsText}`;

    document.getElementById("preview").textContent = passdownText;
  }

  function openEmailDraft() {
    const previewText = document.getElementById("preview").textContent.trim();

    if (
      !previewText ||
      previewText === "Your formatted pass-down will appear here."
    ) {
      alert("Please click 'Format Passdown' first.");
      return;
    }

    const dateValue = document.getElementById("date").value;
    const shift = document.getElementById("shift").value;
    const displayDate = formatDisplayDate(dateValue);

    const subject = `Tech Pass Down – ${displayDate} ${shift}`;

    const mailtoLink =
      `mailto:${recipientList}` +
      `?subject=${encodeURIComponent(subject)}` +
      `&body=${encodeURIComponent(previewText)}`;

    window.location.href = mailtoLink;
  }

  function clearAllFields() {
    document.getElementById("notes").value = "";
    document.getElementById("preview").textContent = "Your formatted pass-down will appear here.";
  }
</script>
